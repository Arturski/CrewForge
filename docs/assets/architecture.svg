  <text x="260" y="524" text-anchor="middle" font-size="10" fill="#cbd5e1">·</text>
  <text x="360" y="524" text-anchor="middle" font-size="10" fill="#cbd5e1">·</text>
  <text x="460" y="524" text-anchor="middle" font-size="10" fill="#cbd5e1">·</text>
  <text x="560" y="524" text-anchor="middle" font-size="10" fill="#cbd5e1">·</text>
