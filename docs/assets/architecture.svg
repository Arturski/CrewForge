  <text x="812" y="364" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">Secrets</text>
  <text x="812" y="382" text-anchor="middle" font-size="9" fill="#334155">Fernet encryption</text>
  <text x="812" y="396" text-anchor="middle" font-size="9" fill="#334155">keys at rest</text>
  <text x="812" y="410" text-anchor="middle" font-size="9" fill="#334155">secret.key (0600)</text>
  <text x="812" y="424" text-anchor="middle" font-size="9" fill="#94a3b8">gitignored</text>

  <!-- Arrow down to external -->
  <line x1="387" y1="440" x2="387" y2="472" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="381,469 387,479 393,469" fill="#94a3b8"/>

