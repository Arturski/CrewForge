  <text x="125" y="396" text-anchor="middle" font-size="9" fill="#047857">schedules · batches · evals</text>
  <text x="125" y="410" text-anchor="middle" font-size="9" fill="#047857">KBs · LLMs · MCP · settings</text>
  <text x="125" y="426" text-anchor="middle" font-size="9" fill="#6ee7b7">WAL mode · JSON blobs</text>

  <!-- CrewAI Runner -->
  <rect x="234" y="344" width="306" height="96" rx="10" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
