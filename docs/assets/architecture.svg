  <text x="384" y="419" text-anchor="middle" font-size="8" fill="#ea580c">HITL · cancel</text>
  <rect x="436" y="374" width="90" height="52" rx="5" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="481" y="393" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c">FakeLLM</text>
  <text x="481" y="407" text-anchor="middle" font-size="8" fill="#ea580c">dry-run mock</text>
  <text x="481" y="419" text-anchor="middle" font-size="8" fill="#ea580c">no key needed</text>

