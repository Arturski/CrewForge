  <text x="518" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Knowledge</text>
  <text x="518" y="120" text-anchor="middle" font-size="9" fill="#3b82f6">RAG · graph viz</text>

