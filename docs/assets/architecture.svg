  <rect x="152" y="83" width="96" height="56" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="200" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Builder</text>
  <text x="200" y="120" text-anchor="middle" font-size="9" fill="#3b82f6">canvas · inspector</text>

  <rect x="258" y="83" width="96" height="56" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="306" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Runs</text>
